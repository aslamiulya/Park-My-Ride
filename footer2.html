<!-- FOOTER -->
<footer class="w-full bg-[#007DB5] text-white text-sm">

  <!-- MAIN -->
  <div class="w-full px-10 py-10">

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 text-center lg:text-left">

      <!-- BRAND -->
      <div class="flex flex-col items-center lg:items-start">
        <h2 class="text-xl font-semibold mb-3">Event Garage Parking</h2>
        <p class="text-xs text-gray-100 max-w-xs leading-5">
          Find and book parking spots at residential homes safe, convenient, and secure.
        </p>
      </div>

      <!-- LINKS -->
      <div class="flex flex-col items-center lg:items-start">
        <h2 class="text-xl font-semibold mb-3">Get to Know Us</h2>
        <ul class="space-y-2 text-xs">
          <li><a href="#" class="hover:text-gray-200">About Us</a></li>
          <li><a href="#" class="hover:text-gray-200">How It Works</a></li>
          <li><a href="#" class="hover:text-gray-200">Contact Us</a></li>
        </ul>
      </div>

      <!-- QUICK LINKS -->
      <div class="flex flex-col items-center lg:items-start">
        <h2 class="text-xl font-semibold mb-3">Quick Links</h2>
        <ul class="space-y-2 text-xs">
          <li><a href="#" class="hover:text-gray-200">Help</a></li>
          <li>
            <a
              href="https://42bs8c.share-na2.hsforms.com/2h9ic7f91RPiKzrbRzkwrmg"
              target="_blank"
              rel="noopener noreferrer"
              class="hover:text-gray-200"
            >
              Become A Host
            </a>
          </li>
        </ul>
      </div>

      <!-- STAY UPDATED -->
      <div class="flex flex-col items-center lg:items-start">

        <h2 class="text-xl font-semibold mb-3">Stay Updated</h2>

        <p class="text-xs text-gray-100 mb-3 max-w-xs">
          Get latest parking updates and offers.
        </p>

        <!-- EMAIL -->
        <form class="flex w-full max-w-[220px] overflow-hidden rounded-md mb-4">

          <div class="flex items-center bg-white w-full px-2">

            <i class="fa-solid fa-envelope text-gray-500 text-xs mr-2"></i>

            <input
              type="email"
              placeholder="Your Email"
              class="w-full py-1.5 text-xs text-black outline-none"
            />

          </div>

          <button class="bg-blue-700 hover:bg-blue-800 px-3 text-xs">
            Subscribe
          </button>

        </form>

        <!-- SOCIAL -->
        <div class="flex gap-4 text-base justify-center lg:justify-start">

          <a href="#" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-instagram"></i>
          </a>

          <a href="#" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-facebook"></i>
          </a>

          <a href="#" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-x-twitter"></i>
          </a>

          <a href="#" target="_blank" rel="noopener noreferrer">
            <i class="fa-solid fa-envelope"></i>
          </a>

        </div>

      </div>

    </div>
  </div>

  <!-- BOTTOM -->
  <div class="border-t border-white/20 px-5 py-6">

    <!-- PAYMENT BOX (FIXED EQUAL SIZE) -->
    <div class="flex justify-center mb-4">

      <div class="flex items-center bg-white rounded-sm overflow-hidden scale-90 origin-center">

        <!-- PayPal -->
        <a href="https://www.paypal.com" target="_blank" rel="noopener noreferrer"
           class="w-10 h-8 flex items-center justify-center border-r border-gray-200">
          <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg"
               class="max-h-5 max-w-full object-contain" alt="PayPal">
        </a>

        <!-- Visa -->
        <a href="https://www.visa.com" target="_blank" rel="noopener noreferrer"
           class="w-10 h-8 flex items-center justify-center border-r border-gray-200">
          <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png"
               class="max-h-5 max-w-full object-contain" alt="Visa">
        </a>

        <!-- Mastercard -->
        <a href="https://www.mastercard.com" target="_blank" rel="noopener noreferrer"
           class="w-10 h-8 flex items-center justify-center border-r border-gray-200">
          <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
               class="max-h-5 max-w-full object-contain" alt="Mastercard">
        </a>

        <!-- Amex -->
        <a href="https://www.americanexpress.com" target="_blank" rel="noopener noreferrer"
           class="w-10 h-8 flex items-center justify-center border-r border-gray-200">
          <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/American_Express_logo.svg"
               class="max-h-5 max-w-full object-contain" alt="Amex">
        </a>

        <!-- Discover -->
        <a href="https://www.discover.com" target="_blank" rel="noopener noreferrer"
           class="w-10 h-8 flex items-center justify-center">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/57/Discover_Card_logo.svg"
               class="max-h-5 max-w-full object-contain" alt="Discover">
        </a>

      </div>

    </div>

    <!-- TEXT -->
    <p class="text-center text-xs text-gray-200">
      Powered by Park My Ride LLC
    </p>

  </div>

</footer>
