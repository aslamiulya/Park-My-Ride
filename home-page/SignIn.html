<!-- JAVASCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  const passwordInput = document.getElementById("password");
  const togglePassword = document.getElementById("togglePassword");
  const loginForm = document.getElementById("loginForm");
  const statusMessage = document.getElementById("statusMessage");

  // Helper for status messages
  function showStatus(message, type = "error") {
    if (!statusMessage) return;

    statusMessage.classList.remove("hidden");

    statusMessage.classList.remove(
      "bg-green-100",
      "text-green-700",
      "bg-red-100",
      "text-red-700"
    );

    statusMessage.classList.add(
      "rounded-lg",
      "p-3",
      "text-sm",
      "font-medium"
    );

    if (type === "success") {
      statusMessage.classList.add("bg-green-100", "text-green-700");
    } else {
      statusMessage.classList.add("bg-red-100", "text-red-700");
    }

    statusMessage.textContent = message;
  }

  // Password Toggle
  if (togglePassword && passwordInput) {
    const eyeIcon = togglePassword.querySelector("i");

    togglePassword.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";

      if (eyeIcon) {
        eyeIcon.classList.toggle("fa-eye");
        eyeIcon.classList.toggle("fa-eye-slash");
      }
    });
  }

  // Login Form
  if (loginForm) {
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email")?.value.trim() || "";
      const password = passwordInput?.value.trim() || "";

      if (!email || !password) {
        showStatus("Please enter both email and password.");
        return;
      }

      const submitButton = loginForm.querySelector('button[type="submit"]');
      if (!submitButton) return;

      const originalText = submitButton.innerHTML;

      submitButton.disabled = true;
      submitButton.innerHTML =
        '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Logging in...';

      try {
        const response = await fetch(
          "https://eventgarageparking.online/api/home-owners/login/",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json"
            },
            body: JSON.stringify({
              email,
              password
            })
          }
        );

        let data = null;

        try {
          data = await response.json();
        } catch (err) {
          console.warn("Response was not valid JSON.");
        }

        console.log("Login Response:", data);
        console.log("FULL LOGIN DATA:", JSON.stringify(data, null, 2));

        if (response.ok) {

          // Get token from possible locations
          const token =
            data?.token ||
            data?.accessToken ||
            data?.access ||
            data?.data?.token ||
            data?.data?.access ||
            data?.data?.accessToken;

          if (token) {
            localStorage.setItem("pmr_token", token);
          }

          // Save only the user object if available
          const user =
            data?.user ||
            data?.data?.user ||
            data;

          localStorage.setItem("user", JSON.stringify(user));

          // Get username from many possible API structures
          const username =
            data?.user?.username ||
            data?.user?.name ||
            data?.user?.full_name ||
            data?.user?.first_name ||
            data?.data?.user?.username ||
            data?.data?.user?.name ||
            data?.data?.username ||
            data?.username ||
            data?.name ||
            data?.full_name ||
            data?.first_name ||
            data?.email ||
            "Guest";

          localStorage.setItem("loggedInUser", username);

          console.log("Saved User:", username);
          console.log("Saved Token:", token);

          showStatus("Login successful! Redirecting...", "success");

          // Redirect
          window.location.href =
            "https://eventgarageparking.net/home-owner-listing-page/";

        } else {

          const errorMessage =
            data?.message ||
            data?.error ||
            data?.errors?.email?.[0] ||
            data?.errors?.password?.[0] ||
            `Login failed (${response.status})`;

          showStatus(errorMessage);

        }

      } catch (error) {

        console.error("Login Error:", error);
        showStatus("Server not reachable.");

      } finally {

        submitButton.disabled = false;
        submitButton.innerHTML = originalText;

      }
    });
  }
});
</script>
