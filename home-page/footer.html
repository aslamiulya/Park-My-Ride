<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <title>Responsive Footer</title>
</head>

<body class="m-0 p-0 box-border">

  <!-- FOOTER -->
  <footer class="w-full bg-[#027EB6] flex justify-center items-center px-4 py-12">

    <!-- MAIN CONTENT -->
    <div
      class="w-[90vw]
             text-white
             flex
             flex-col
             gap-10

             sm:grid sm:grid-cols-3 sm:gap-8

             lg:flex lg:flex-row lg:justify-between lg:items-start lg:gap-6"
    >

      <!-- COLUMN 1 -->
    <div
        class="w-full lg:w-1/4 flex flex-col items-start text-left gap-4"
    >

        <h2 class="text-[22px] font-bold leading-tight">
            Event garage parking
        </h2>

        <p class="text-[13px] leading-[24px] opacity-90 max-w-[280px] text-left">
            Find book parking spots at residential homes.
            Safe, convenient, and affordable.
        </p>

    </div>

      <!-- CENTER CONTENT -->
      <div
        class="w-full
               lg:flex-1
               flex
               flex-col
               sm:flex-row
               justify-center
               items-start
               gap-10
               lg:gap-20"
      >

        <!-- COLUMN 2 -->
        <div class="flex flex-col gap-2 text-center sm:text-left xl:mr-10 lg:mr-10">

          <h2 class="text-[16px] font-bold">
            Get to know us
          </h2>

          <a href="#" class="text-[13px] leading-[20px] opacity-90">
            About us
          </a>

          <a href="#" class="text-[13px] leading-[20px] opacity-90">
            How it works
          </a>

          <a href="#" class="text-[13px] leading-[20px] opacity-90">
            Contact us
          </a>

        </div>

        <!-- COLUMN 3 -->
        <div class="flex flex-col gap-2 text-center sm:text-left">

          <h2 class="text-[16px] font-bold">
            Quick links
          </h2>

          <a href="/help" class="text-[13px] leading-[20px] opacity-90">
            Help
          </a>

          <a href="#" class="text-[13px] leading-[20px] opacity-90">
            Become a host
          </a>

        </div>

      </div>

      <!-- COLUMN 4 -->
      <div
        class="w-full
               lg:w-1/4
               flex flex-col gap-4"
      >

        <h2 class="text-[16px] font-bold text-center lg:text-left">
          Stay updated
        </h2>

        <p class="text-[13px] opacity-90 text-center lg:text-left">
          Get the latest parking updates and exclusive offers.
        </p>

        <!-- EMAIL -->
        <div class="flex gap-2 w-full">

          <div class="relative flex-1">

            <i
              class="fa-regular fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"
            ></i>

            <input
              type="email"
              placeholder="Your email"
              class="w-full h-[44px] rounded-[10px] bg-white pl-8 text-[14px] text-black outline-none"
            />

          </div>

          <button
            class="bg-[#005F8A] px-4 rounded-[10px] whitespace-nowrap"
          >
            Subscribe
          </button>

        </div>

        <!-- SOCIAL ICONS -->
        <div
          class="flex gap-3 flex-wrap justify-center lg:justify-start"
        >

          <a
            href="#"
            class="w-[38px] h-[38px] border border-white rounded-full flex items-center justify-center"
          >
            <i class="fa-brands fa-instagram"></i>
          </a>

          <a
            href="#"
            class="w-[38px] h-[38px] border border-white rounded-full flex items-center justify-center"
          >
            <i class="fa-brands fa-facebook-f"></i>
          </a>

          <a
            href="#"
            class="w-[38px] h-[38px] border border-white rounded-full flex items-center justify-center"
          >
            <i class="fa-brands fa-x-twitter"></i>
          </a>

          <a
            href="#"
            class="w-[38px] h-[38px] border border-white rounded-full flex items-center justify-center"
          >
            <i class="fa-regular fa-envelope"></i>
          </a>

        </div>

      </div>

    </div>
     

  </footer>

</body>
</html>
